<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Снежок — Вход</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --snow-50: #f0f7ff;
    --snow-100: #e0f0ff;
    --snow-200: #c2e1ff;
    --snow-300: #8fc8ff;
    --snow-400: #5aadff;
    --snow-500: #3b93f0;
    --snow-600: #2a7ad4;
    --snow-700: #1e5fa8;
    --frost-50: #f4f9fc;
    --frost-100: #e8f2f8;
    --frost-200: #d1e6f2;
    --text-primary: #1a2b3c;
    --text-secondary: #5a6d7e;
    --text-muted: #8a9bac;
    --white: #ffffff;
    --card-shadow: 0 8px 40px rgba(59, 147, 240, 0.08), 0 2px 8px rgba(0,0,0,0.04);
    --card-shadow-hover: 0 12px 48px rgba(59, 147, 240, 0.12), 0 4px 12px rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--frost-50);
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(143, 200, 255, 0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 90%, rgba(90, 173, 255, 0.1) 0%, transparent 50%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(194, 225, 255, 0.08) 0%, transparent 40%);
    overflow: hidden;
    position: relative;
  }

  /* Subtle floating snowflakes */
  .snowflake {
    position: fixed;
    color: var(--snow-300);
    opacity: 0;
    font-size: 14px;
    pointer-events: none;
    animation: snowfall linear infinite;
  }
  .snowflake:nth-child(1) { left: 10%; animation-duration: 18s; animation-delay: 0s; font-size: 10px; }
  .snowflake:nth-child(2) { left: 25%; animation-duration: 22s; animation-delay: 3s; font-size: 8px; }
  .snowflake:nth-child(3) { left: 45%; animation-duration: 20s; animation-delay: 7s; font-size: 12px; }
  .snowflake:nth-child(4) { left: 65%; animation-duration: 24s; animation-delay: 2s; font-size: 6px; }
  .snowflake:nth-child(5) { left: 80%; animation-duration: 19s; animation-delay: 5s; font-size: 10px; }
  .snowflake:nth-child(6) { left: 92%; animation-duration: 21s; animation-delay: 8s; font-size: 8px; }

  @keyframes snowfall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
    10% { opacity: 0.3; }
    90% { opacity: 0.2; }
    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
  }

  .login-container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.6s ease-out;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .login-card {
    background: var(--white);
    border-radius: 20px;
    padding: 48px 40px 40px;
    box-shadow: var(--card-shadow);
    transition: box-shadow 0.3s ease;
    border: 1px solid rgba(194, 225, 255, 0.3);
  }

  .login-card:hover {
    box-shadow: var(--card-shadow-hover);
  }

  /* Logo */
  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 48px;
    height: 48px;
    position: relative;
  }

  .logo-icon svg {
    width: 48px;
    height: 48px;
  }

  .logo-text {
    font-size: 32px;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.5px;
  }

  .logo-text span {
    color: var(--snow-500);
  }

  .subtitle {
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 36px;
    letter-spacing: 0.5px;
  }

  /* Form */
  .form-group {
    margin-bottom: 20px;
  }

  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-secondary);
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }

  .form-input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid var(--frost-200);
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    background: var(--frost-50);
    outline: none;
    transition: all 0.2s ease;
  }

  .form-input::placeholder {
    color: var(--text-muted);
    font-weight: 400;
  }

  .form-input:focus {
    border-color: var(--snow-400);
    background: var(--white);
    box-shadow: 0 0 0 4px rgba(90, 173, 255, 0.1);
  }

  .submit-btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--snow-500) 0%, var(--snow-400) 100%);
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-top: 8px;
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
  }

  .submit-btn:hover {
    background: linear-gradient(135deg, var(--snow-600) 0%, var(--snow-500) 100%);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(59, 147, 240, 0.3);
  }

  .submit-btn:active {
    transform: translateY(0);
    box-shadow: 0 2px 8px rgba(59, 147, 240, 0.2);
  }

  /* Temperature badge */
  .temp-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 28px;
    padding: 10px 16px;
    background: var(--frost-100);
    border-radius: 10px;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
  }

  .temp-badge .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #34d399;
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 24px;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .login-card {
      padding: 36px 28px 32px;
      border-radius: 16px;
    }
    .logo-text { font-size: 28px; }
    .logo-icon svg { width: 40px; height: 40px; }
  }
</style>
</head>
<body>

<!-- Subtle snowflakes -->
<div class="snowflake">❄</div>
<div class="snowflake">❄</div>
<div class="snowflake">❄</div>
<div class="snowflake">❄</div>
<div class="snowflake">❄</div>
<div class="snowflake">❄</div>

<div class="login-container">
  <div class="login-card">

    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Snowflake icon -->
          <circle cx="24" cy="24" r="22" fill="url(#logoGrad)" opacity="0.1"/>
          <g stroke="url(#logoGrad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <!-- Main axes -->
            <line x1="24" y1="8" x2="24" y2="40"/>
            <line x1="10.15" y1="16" x2="37.85" y2="32"/>
            <line x1="10.15" y1="32" x2="37.85" y2="16"/>
            <!-- Branch details -->
            <line x1="24" y1="8" x2="20" y2="12"/>
            <line x1="24" y1="8" x2="28" y2="12"/>
            <line x1="24" y1="40" x2="20" y2="36"/>
            <line x1="24" y1="40" x2="28" y2="36"/>
            <!-- Side branches -->
            <line x1="10.15" y1="16" x2="14" y2="16"/>
            <line x1="10.15" y1="16" x2="12" y2="12.5"/>
            <line x1="37.85" y1="32" x2="34" y2="32"/>
            <line x1="37.85" y1="32" x2="36" y2="35.5"/>
            <line x1="10.15" y1="32" x2="14" y2="32"/>
            <line x1="10.15" y1="32" x2="12" y2="35.5"/>
            <line x1="37.85" y1="16" x2="34" y2="16"/>
            <line x1="37.85" y1="16" x2="36" y2="12.5"/>
            <!-- Center dot -->
            <circle cx="24" cy="24" r="2.5" fill="url(#logoGrad)" stroke="none"/>
          </g>
          <defs>
            <linearGradient id="logoGrad" x1="10" y1="10" x2="38" y2="38">
              <stop offset="0%" stop-color="#5aadff"/>
              <stop offset="100%" stop-color="#3b93f0"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="logo-text">Снеж<span>ок</span></div>
    </div>

    <div class="subtitle">Мониторинг температуры</div>

    <!-- Form -->
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" placeholder="user@company.ru" autocomplete="email">
    </div>

    <div class="form-group">
      <label class="form-label">Пароль</label>
      <input type="password" class="form-input" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="submit-btn">Войти</button>

    <div class="temp-badge">
      <span class="dot"></span>
      Система работает в штатном режиме
    </div>
  </div>

  <div class="footer">© 2026 Снежок</div>
</div>

</body>
</html>
