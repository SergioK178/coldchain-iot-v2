name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared & db
        run: pnpm --filter @sensor/shared build && pnpm --filter @sensor/db build

      - name: Build server
        run: pnpm --filter @sensor/server build

      - name: Typecheck & build web
        run: pnpm --filter @sensor/web run typecheck && pnpm --filter @sensor/web build
