name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p .ssh-deploy
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > .ssh-deploy/key
          chmod 600 .ssh-deploy/key

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key_path: ${{ github.workspace }}/.ssh-deploy/key
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH || '/var/www/coldchain-iot-v2' }}
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            docker compose -f deploy/docker-compose.yml --profile https build --no-cache
            docker compose -f deploy/docker-compose.yml --profile https up -d
          script_stop: true
