name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Validate lockfile
        run: pnpm install --frozen-lockfile

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy via SSH
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/var/www/coldchain-iot-v2' }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            set -e
            cd $DEPLOY_PATH
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            docker compose -f deploy/docker-compose.yml --profile https build
            docker compose -f deploy/docker-compose.yml --profile https up -d
          "
