services:
  db:
    image: timescale/timescaledb:2.17.2-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${DB_NAME:-sensors}"
      POSTGRES_USER: "${DB_USER:-sensors}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:?error: set DB_PASSWORD in .env}"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sensors}"]
      interval: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2.0.20
    container_name: mqtt
    restart: unless-stopped
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./data/mosquitto:/mosquitto/config/runtime
    ports:
      - "${MQTT_PORT:-1883}:1883"
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/broker/uptime' -C 1 -W 3 || exit 0"]
      interval: 10s
      retries: 3

  server:
    # Default for local/dev: use locally built image to avoid pulling template GHCR path.
    # For staging/prod set a real registry image, e.g. ghcr.io/<org>/<repo>:<tag>.
    image: sensor-server-local:0.1.0
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
      mqtt: { condition: service_started }
    environment:
      DATABASE_URL: "postgresql://${DB_USER:-sensors}:${DB_PASSWORD}@db:5432/${DB_NAME:-sensors}"
      MQTT_URL: "mqtt://mqtt:1883"
      MQTT_ADMIN_USER: "${MQTT_ADMIN_USER:-server}"
      MQTT_ADMIN_PASSWORD: "${MQTT_ADMIN_PASSWORD:?error: set MQTT_ADMIN_PASSWORD in .env}"
      API_TOKEN: "${API_TOKEN:?error: set API_TOKEN in .env}"
      ALERT_CALLBACK_URL: "${ALERT_CALLBACK_URL:-}"
      DEVICE_OFFLINE_TIMEOUT_SEC: "${DEVICE_OFFLINE_TIMEOUT_SEC:-300}"
      MOSQUITTO_DATA_DIR: "/mosquitto-data"
      MOSQUITTO_CONTAINER_NAME: "mqtt"
      DOCKER_SOCKET: "/var/run/docker.sock"
    volumes:
      - ./data/mosquitto:/mosquitto-data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${HTTP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 10s
      retries: 5
      start_period: 30s

volumes: {}
# Все данные в ./data/ на хосте (bind mounts), не named volumes.
